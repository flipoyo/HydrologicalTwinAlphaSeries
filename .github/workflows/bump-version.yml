name: Bump Version

on:
  push:
    branches:
      - main

jobs:
  bump:
    # Skip if this push was itself a version-bump commit, to avoid infinite loops.
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the push back is possible.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump version in pyproject.toml
        id: bump
        run: |
          python - <<'EOF'
          import re
          import sys
          import tomllib
          from pathlib import Path

          def bump(version: str) -> str:
              """Increment version following the III.alpha.NN scheme.

              Rules
              -----
              - If NN < 99: increment NN (zero-padded to 2 digits).
              - If NN == 99: increment III (zero-padded to 3 digits) and reset NN to 01.

              Examples
              --------
              "000.alpha.02" -> "000.alpha.03"
              "000.alpha.98" -> "000.alpha.99"
              "000.alpha.99" -> "001.alpha.01"
              "001.alpha.99" -> "002.alpha.01"
              """
              m = re.fullmatch(r"(\d+)\.alpha\.(\d+)", version)
              if not m:
                  print(f"ERROR: cannot parse version {version!r} (expected III.alpha.NN)", file=sys.stderr)
                  sys.exit(1)
              iii = int(m.group(1))
              nn = int(m.group(2))
              if nn < 99:
                  return f"{iii:03d}.alpha.{nn + 1:02d}"
              else:
                  return f"{iii + 1:03d}.alpha.01"

          def replace_version_in_section(text: str, section: str, new_version: str) -> str:
              """Replace the version value inside a TOML section."""
              section_re = re.compile(
                  rf"(^\[{re.escape(section)}\][^\n]*\n?)(.*?)(?=^\[|\Z)",
                  re.MULTILINE | re.DOTALL,
              )
              m = section_re.search(text)
              if not m:
                  print(f"ERROR: section [{section}] not found in pyproject.toml", file=sys.stderr)
                  sys.exit(1)

              body = m.group(2)
              version_re = re.compile(r'^(version\s*=\s*["\'])([^"\']+)(["\'])', re.MULTILINE)
              mv = version_re.search(body)
              if not mv:
                  print(f"ERROR: version field not found in [{section}] in pyproject.toml", file=sys.stderr)
                  sys.exit(1)

              body = body[: mv.start(2)] + new_version + body[mv.end(2) :]
              return text[: m.start(2)] + body + text[m.end(2) :]

          root = Path(".")

          # --- pyproject.toml ---
          pyproject = root / "pyproject.toml"
          text = pyproject.read_text()
          old_ver = tomllib.loads(text)["project"]["version"]
          new_ver = bump(old_ver)
          text = replace_version_in_section(text, "project", new_ver)
          text = replace_version_in_section(text, "tool.pixi.workspace", new_ver)
          pyproject.write_text(text)

          print(f"Bumped version: {old_ver} -> {new_ver}")
          # Expose the new version to subsequent steps via $GITHUB_OUTPUT.
          import os
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"new_version={new_ver}\n")
              fh.write(f"old_version={old_ver}\n")
          EOF

      - name: Commit and push bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version ${{ steps.bump.outputs.old_version }} -> ${{ steps.bump.outputs.new_version }}"
          git push
