name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) pixi_target="x86_64-unknown-linux-musl" ;;
            Linux-aarch64|Linux-arm64) pixi_target="aarch64-unknown-linux-musl" ;;
            *)
              echo "::error::Unsupported runner platform for Pixi: $(uname -s) $(uname -m)"
              exit 1
              ;;
          esac
          pixi_url="https://github.com/prefix-dev/pixi/releases/latest/download/pixi-${pixi_target}.tar.gz"
          pixi_archive="$(mktemp)"
          trap 'test -n "${pixi_archive:-}" && rm -f "$pixi_archive"' EXIT INT TERM
          download_with_wget() {
            if ! wget --timeout=120 --tries=1 -O "$pixi_archive" "$pixi_url"; then
              echo "::error::Failed to download Pixi with wget from $pixi_url"
              exit 1
            fi
          }
          download_pixi() {
            if command -v curl >/dev/null 2>&1 && curl -fsSL --connect-timeout 15 --max-time 120 "$pixi_url" -o "$pixi_archive"; then
              return
            fi
            if command -v wget >/dev/null 2>&1; then
              echo "curl unavailable or download failed for $pixi_url, falling back to wget..."
              download_with_wget
              return
            fi
            echo "::error::Neither curl nor wget could download Pixi from $pixi_url"
            exit 1
          }
          download_pixi
          mkdir -p "$HOME/.pixi/bin"
          if ! tar -xzf "$pixi_archive" -C "$HOME/.pixi/bin"; then
            echo "::error::Failed to extract Pixi archive from $pixi_url"
            exit 1
          fi
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
          "$HOME/.pixi/bin/pixi" --version

      - name: Install environment
        run: pixi install

      - name: Check Pixi config is in pyproject.toml
        run: |
          python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          pixi = data['tool']['pixi']
          assert pixi['workspace']['channels'] == ['conda-forge']
          assert pixi['workspace']['platforms'] == ['linux-64']
          ")

      - name: Enforce QGIS-free backend
        run: |
          if grep -R -nE '^\s*(from|import)\s+(qgis(\.PyQt)?|PyQt5?)\b' src; then
            echo "QGIS or PyQt imports found in backend package"
            exit 1
          fi

      - name: Lint
        run: pixi run lint

      - name: Clone CaWaQS testcase fixture
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            --branch v0.1-cwv-gis-smoke-CI \
            https://gitlab.com/cawaqs/gtest/testcases.git "$RUNNER_TEMP/testcases"
          git -C "$RUNNER_TEMP/testcases" sparse-checkout set datasets/cwv-gis-testcase
          echo "CWAQS_FIXTURE_ROOT=$RUNNER_TEMP/testcases/datasets/cwv-gis-testcase" >> "$GITHUB_ENV"

      - name: Run tests
        run: pixi run test

      - name: Smoke test package entry point
        run: pixi run run
