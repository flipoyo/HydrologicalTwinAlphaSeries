name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
          "$HOME/.pixi/bin/pixi" --version

      - name: Install environment
        run: pixi install

      - name: Enforce QGIS-free backend
        run: |
          if grep -R -nE '^\s*(from|import)\s+(qgis(\.PyQt)?|PyQt5?)\b' src; then
            echo "QGIS or PyQt imports found in backend package"
            exit 1
          fi

      - name: Lint
        run: pixi run lint

      - name: Run tests
        run: pixi run test

      - name: Smoke test package entry point
        run: pixi run run