name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) pixi_target="x86_64-unknown-linux-musl" ;;
            Linux-aarch64|Linux-arm64) pixi_target="aarch64-unknown-linux-musl" ;;
            *)
              echo "::error::Unsupported runner platform for Pixi: $(uname -s) $(uname -m)"
              exit 1
              ;;
          esac
          pixi_url="https://github.com/prefix-dev/pixi/releases/latest/download/pixi-${pixi_target}.tar.gz"
          pixi_archive="$(mktemp)"
          if command -v curl >/dev/null 2>&1; then
            if ! curl -fsSL "$pixi_url" -o "$pixi_archive"; then
              if command -v wget >/dev/null 2>&1; then
                wget -qO "$pixi_archive" "$pixi_url"
              else
                echo "::error::Failed to download Pixi with curl and wget is unavailable"
                exit 1
              fi
            fi
          elif command -v wget >/dev/null 2>&1; then
            wget -qO "$pixi_archive" "$pixi_url"
          else
            echo "::error::Neither curl nor wget is available to download Pixi"
            exit 1
          fi
          mkdir -p "$HOME/.pixi/bin"
          tar -xzf "$pixi_archive" -C "$HOME/.pixi/bin"
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"
          "$HOME/.pixi/bin/pixi" --version

      - name: Install environment
        run: pixi install

      - name: Check version consistency
        run: |
          pyproject_ver=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          pixi_ver=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pixi.toml').read_text())
          print(data['workspace']['version'])
          ")
          if [ "$pyproject_ver" != "$pixi_ver" ]; then
            echo "::error::Version mismatch: pyproject.toml=$pyproject_ver vs pixi.toml=$pixi_ver"
            exit 1
          fi
          echo "Versions are consistent: $pyproject_ver"

      - name: Enforce QGIS-free backend
        run: |
          if grep -R -nE '^\s*(from|import)\s+(qgis(\.PyQt)?|PyQt5?)\b' src; then
            echo "QGIS or PyQt imports found in backend package"
            exit 1
          fi

      - name: Lint
        run: pixi run lint

      - name: Run tests
        run: pixi run test

      - name: Smoke test package entry point
        run: pixi run run
