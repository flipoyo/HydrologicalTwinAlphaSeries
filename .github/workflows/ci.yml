name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install environment
        run: uv sync --extra dev

      - name: Enforce QGIS-free backend
        run: |
          if grep -R -nE '^\s*(from|import)\s+(qgis(\.PyQt)?|PyQt5?)\b' src; then
            echo "QGIS or PyQt imports found in backend package"
            exit 1
          fi

      - name: Lint
        run: uv run ruff check src tests

      - name: Run tests
        run: uv run pytest

      - name: Smoke test package entry point
        run: uv run python -m HydrologicalTwinAlphaSeries
