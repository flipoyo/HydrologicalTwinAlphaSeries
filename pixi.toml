[workspace]
authors = [
    "Nicolas Flipo",
    "Simone Mazzarelli",
    "HydrologicalTwinAlphaSeries contributors",
]
channels = ["conda-forge"]
name = "HydrologicalTwinAlphaSeries"
platforms = ["linux-64"]
version = "000.alpha.22"

[tasks]
run = "python -m HydrologicalTwinAlphaSeries"
test = "pytest"
lint = "ruff check src tests"
dev-setup = "pre-commit install"

[dependencies]
python = "3.11.*"
pytest = ">=8,<9"
ruff = ">=0.12,<1"
pre-commit = ">=3.7"

[pypi-dependencies]
HydrologicalTwinAlphaSeries = { path = ".", editable = true }
